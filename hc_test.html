<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Highcharts Load Test</title>
</head>
<body>
<h2>Highcharts Load Diagnostic</h2>
<pre id="log" style="font-size:14px; line-height:1.8;"></pre>
<div id="test_chart" style="height:300px; width:600px; border:1px solid #ccc; margin-top:20px;"></div>

<script>
function log(msg, ok) {
    const el = document.getElementById('log');
    el.innerHTML += (ok === true ? '✅ ' : ok === false ? '❌ ' : '⏳ ') + msg + '\n';
}

log('Page loaded', true);

// Step 1: check internet connectivity
fetch('https://www.google.com', { mode: 'no-cors' })
    .then(() => log('Internet reachable (google.com)', true))
    .catch(e => log('Internet NOT reachable: ' + e, false));

// Step 2: check if Highcharts CDN loads
const hcScript = document.createElement('script');
hcScript.src = 'https://code.highcharts.com/highcharts.js';
hcScript.onload = function() {
    log('highcharts.js loaded OK', true);

    // Step 3: load variwide module
    const vw = document.createElement('script');
    vw.src = 'https://code.highcharts.com/modules/variwide.js';
    vw.onload = function() {
        log('variwide.js loaded OK', true);

        // Step 4: actually render a chart
        try {
            Highcharts.chart('test_chart', {
                chart: { type: 'variwide' },
                title: { text: 'Test Variwide Chart' },
                xAxis: { type: 'category' },
                yAxis: { title: { text: 'Value' } },
                series: [{
                    name: 'Test',
                    data: [
                        { name: 'Fund A', y: 12, z: 30 },
                        { name: 'Fund B', y: 8,  z: 50 },
                        { name: 'Fund C', y: 15, z: 20 }
                    ],
                    colorByPoint: true
                }],
                legend: { enabled: false }
            });
            log('Variwide chart rendered successfully!', true);
        } catch(e) {
            log('Chart render FAILED: ' + e.message, false);
        }
    };
    vw.onerror = function() { log('variwide.js FAILED to load', false); };
    document.head.appendChild(vw);

    // Step 5: check stock module separately
    const stock = document.createElement('script');
    stock.src = 'https://code.highcharts.com/stock/modules/stock.js';
    stock.onload = function() { log('stock.js loaded OK', true); };
    stock.onerror = function() { log('stock.js FAILED to load', false); };
    document.head.appendChild(stock);
};
hcScript.onerror = function() {
    log('highcharts.js FAILED to load from code.highcharts.com', false);
    log('Trying jsdelivr mirror...', null);

    // Fallback: try jsdelivr
    const hcFallback = document.createElement('script');
    hcFallback.src = 'https://cdn.jsdelivr.net/npm/highcharts/highcharts.js';
    hcFallback.onload = function() { log('Highcharts loaded from jsdelivr mirror OK', true); };
    hcFallback.onerror = function() { log('jsdelivr mirror ALSO failed — no internet access to CDNs', false); };
    document.head.appendChild(hcFallback);
};
document.head.appendChild(hcScript);
</script>
</body>
</html>
